<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e3a8a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#001040" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <title>Edullent — Owner Dashboard</title>
    <meta name="description" content="Edullent owner dashboard — multi-branch school analytics, finance, academics and operations." />
    <meta name="author" content="Edullent" />

    <!-- Canonical URL — helps SEO + link-share normalization. -->
    <link rel="canonical" href="https://owner.edullent.com/" />

    <!-- Open Graph — WhatsApp / Slack / LinkedIn / Facebook previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Edullent" />
    <meta property="og:title" content="Edullent — Owner Dashboard" />
    <meta property="og:description" content="Multi-branch school analytics, finance, academics and operations." />
    <meta property="og:url" content="https://owner.edullent.com/" />
    <meta property="og:image" content="https://owner.edullent.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Edullent — Owner Dashboard" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter card — large summary -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Edullent — Owner Dashboard" />
    <meta name="twitter:description" content="Multi-branch school analytics, finance, academics and operations." />
    <meta name="twitter:image" content="https://owner.edullent.com/og-image.png" />
    <meta name="twitter:image:alt" content="Edullent — Owner Dashboard" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Edullent" />
    <meta name="application-name" content="Edullent" />

    <link rel="icon" type="image/png" href="/edullent-icon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#1e3a8a" />

    <!-- iOS launch splash screens — one per device class. Without these,
         iOS shows a blank white screen for ~1s on home-screen launch.
         The media queries match Apple's device dimensions; iOS picks
         the closest match automatically.

         Generated via: python scripts/generate-splash.py
    -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"           href="/splash/ios-640x1136.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"           href="/splash/ios-750x1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"           href="/splash/ios-828x1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1125x2436.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1242x2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1284x2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1179x2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"           href="/splash/ios-1290x2796.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)"          href="/splash/ios-1536x2048.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)"          href="/splash/ios-1668x2388.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)"         href="/splash/ios-2048x2732.png" />

    <!-- JSON-LD structured data — gives search engines (Google, Bing) a clean
         machine-readable description. Enables Knowledge Graph eligibility +
         richer SERP snippets. Two graphs: Organization (who we are) +
         WebApplication (what this app is). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://owner.edullent.com/#organization",
            "name": "Edullent",
            "url": "https://owner.edullent.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://owner.edullent.com/icons/icon-512x512.png",
              "width": 512,
              "height": 512
            },
            "description": "Multi-branch school management SaaS — analytics, finance, academics, operations.",
            "email": "edullentofficial@gmail.com"
          },
          {
            "@type": "WebApplication",
            "@id": "https://owner.edullent.com/#webapp",
            "name": "Edullent — Owner Dashboard",
            "url": "https://owner.edullent.com/",
            "applicationCategory": "BusinessApplication",
            "applicationSubCategory": "EducationManagement",
            "operatingSystem": "Any (Web)",
            "browserRequirements": "Requires a modern browser (Chrome, Edge, Safari, Firefox)",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "INR",
              "category": "subscription-trial"
            },
            "publisher": { "@id": "https://owner.edullent.com/#organization" },
            "screenshot": "https://owner.edullent.com/og-image.png",
            "softwareVersion": "1.0.0"
          }
        ]
      }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
